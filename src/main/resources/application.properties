spring.application.name=exam_service
server.port=8082
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/exam_bank_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:27092005}

spring.jpa.open-in-view=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

app.reporting.auto-hide-threshold=${REPORTING_AUTO_HIDE_THRESHOLD:5}

server.servlet.context-path=/api/v1/exam

auth.jwt.issuer=${JWT_ISSUER:auth_service}
# Base64 secret used by auth_service for HS256 signing
auth.jwt.secret=${JWT_SECRET_BASE64:VjNyeVNlY3VyZVNlY3JldEtleUZvckF1dGhTZXJ2aWNlMTIzNDU2Nzg5MDE=}

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Redis (token blacklist + refresh token store)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}
#spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}

spring.data.jpa.repositories.enabled=true
spring.data.redis.repositories.enabled=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
auth.events.exchange=${AUTH_EVENTS_EXCHANGE:auth.events}
auth.events.user-profile-sync-routing-key=${AUTH_EVENTS_USER_PROFILE_SYNC_ROUTING_KEY:auth.user.profile.sync}
auth.events.user-profile-sync.queue=${AUTH_EVENTS_USER_PROFILE_SYNC_QUEUE:exam.auth.user-profile-sync.queue}
