spring.application.name=exam_service
server.port=${SERVER_PORT:8082}

# Load .env from project root when running locally (optional = silent skip if missing, e.g. inside Docker)
spring.config.import=optional:file:../.env[.properties]
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/exam_bank_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.open-in-view=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

app.reporting.auto-hide-threshold=${REPORTING_AUTO_HIDE_THRESHOLD:5}

server.servlet.context-path=/api/v1/exam

auth.jwt.issuer=${JWT_ISSUER:auth_service}
auth.jwt.secret=${JWT_SECRET}
# CORS allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Redis (token blacklist + refresh token store)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}
#spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}

spring.data.jpa.repositories.enabled=true
spring.data.redis.repositories.enabled=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
exam.events.exchange=${EXAM_EVENTS_EXCHANGE:exam.events}
exam.events.routing-key=${EXAM_EVENTS_ROUTING_KEY:exam.submitted}
exam.events.queue=${EXAM_EVENTS_QUEUE:exam.events.queue}
auth.events.exchange=${AUTH_EVENTS_EXCHANGE:auth.events}
auth.events.user-profile-sync-routing-key=${AUTH_EVENTS_USER_PROFILE_SYNC_ROUTING_KEY:auth.user.profile.sync}
auth.events.user-profile-sync.queue=${AUTH_EVENTS_USER_PROFILE_SYNC_QUEUE:exam.auth.user-profile-sync.queue}

# MinIO Configuration
minio.url=${MINIO_URL:http://127.0.0.1:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password}
minio.bucket-name=${MINIO_BUCKET_NAME:exam-sources}

# RabbitMQ - Routing key cho event upload file
exam.events.file-uploaded-routing-key=${EXAM_EVENTS_FILE_UPLOADED_ROUTING_KEY:exam.source.uploaded}
# AI extraction result consumer
exam.events.ai-extracted-routing-key=${EXAM_EVENTS_AI_EXTRACTED_ROUTING_KEY:search.ai.extracted}
exam.extraction.result.queue=${EXAM_EXTRACTION_RESULT_QUEUE:exam.extraction.result.queue}
# Upload file size limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Exam upload (valet-key flow)
exam.upload.presign-put-ttl-seconds=${EXAM_UPLOAD_PUT_TTL:900}
exam.upload.presign-get-ttl-seconds=${EXAM_UPLOAD_GET_TTL:600}
exam.upload.max-pages=${EXAM_UPLOAD_MAX_PAGES:20}
exam.upload.allowed-content-types=image/jpeg,image/png,image/webp,application/pdf